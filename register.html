<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="center-box">
    <section class="card">
      <h2>Create Student Account</h2>
      <p class="form-help">Use a YIC email to create your account.</p>

      <form onsubmit="return registerUser(event)">
        <label for="registerName">Full Name</label>
        <input type="text" id="registerName" placeholder="Enter your full name" required>

        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" placeholder="example@student.yic.edu.sa" required>

        <label for="registerPassword">Password</label>
        <input type="password" id="registerPassword" placeholder="At least 6 characters" required>

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" required>

        <button type="submit">Register</button>
      </form>

      <p>Already have an account? <a href="login.html">Login here</a></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
